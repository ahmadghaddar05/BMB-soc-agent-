
services:
  postgres:
    image: postgres:16-alpine
    container_name: soc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-socagent}
      POSTGRES_USER: ${POSTGRES_USER:-socagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socagent} -d ${POSTGRES_DB:-socagent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  enrichment:
    build: ./enrichment
    container_name: soc_enrichment
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: soc_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      enrichment:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-socagent}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-socagent}
      ENRICHMENT_URL: http://enrichment:3001
      ALERT_SOURCE: ${ALERT_SOURCE:-mock}
      # Temporary Phase 1 access boundary (full RBAC follows in a later phase)
      SOC_AUTH_DISABLED: "false"
      SOC_ADMIN_USERNAME: ${SOC_ADMIN_USERNAME:-admin}
      SOC_ADMIN_PASSWORD: ${SOC_ADMIN_PASSWORD:-}
      SOC_SESSION_SECRET: ${SOC_SESSION_SECRET:-}
      SOC_SESSION_TTL_MINUTES: ${SOC_SESSION_TTL_MINUTES:-480}
      SOC_COOKIE_SECURE: ${SOC_COOKIE_SECURE:-false}
      SOC_API_KEY: ${SOC_API_KEY:-}
      SOC_ALLOWED_ORIGINS: ${SOC_ALLOWED_ORIGINS:-}
      # Elastic Security — read only
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      ELASTIC_ALERT_ALIAS: ${ELASTIC_ALERT_ALIAS:-.alerts-security.alerts-default}
      ELASTIC_SPACE_ID: ${ELASTIC_SPACE_ID:-default}
      ELASTIC_API_KEY: ${ELASTIC_API_KEY}
      ELASTIC_CA_CERT: ${ELASTIC_CA_CERT:-/run/secrets/http_ca.crt}
      ELASTIC_VERIFY_TLS: ${ELASTIC_VERIFY_TLS:-true}
      # Wazuh
      WAZUH_MODE: ${WAZUH_MODE:-mock}
      WAZUH_INDEXER_URL: ${WAZUH_INDEXER_URL:-}
      WAZUH_INDEXER_USER: ${WAZUH_INDEXER_USER:-admin}
      WAZUH_INDEXER_PASS: ${WAZUH_INDEXER_PASS:-}
      WAZUH_VERIFY_TLS: ${WAZUH_VERIFY_TLS:-false}
      WAZUH_INDEX: ${WAZUH_INDEX:-wazuh-alerts-*}
      # Legacy provider settings retained only for the disconnected Phase 5 correlation migration
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      # Hermes AI Analyst and triage (API key remains backend-only; no legacy fallback)
      HERMES_REQUIRED: ${HERMES_REQUIRED:-true}
      HERMES_API_URL: ${HERMES_API_URL:-http://host.docker.internal:8642/v1}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_MODEL: ${HERMES_MODEL:-hermes-agent}
      HERMES_TIMEOUT_MS: ${HERMES_TIMEOUT_MS:-180000}
      HERMES_REQUEST_TIMEOUT_MS: ${HERMES_REQUEST_TIMEOUT_MS:-10000}
      HERMES_MAX_RETRIES: ${HERMES_MAX_RETRIES:-2}
      HERMES_POLL_INTERVAL_MS: ${HERMES_POLL_INTERVAL_MS:-500}
      HERMES_CAPABILITY_TTL_MS: ${HERMES_CAPABILITY_TTL_MS:-60000}
      HERMES_ANALYST_MAX_TOOL_CALLS: ${HERMES_ANALYST_MAX_TOOL_CALLS:-4}
      HERMES_ANALYST_TIMEOUT_MS: ${HERMES_ANALYST_TIMEOUT_MS:-240000}
      HERMES_TRIAGE_MAX_TOOL_CALLS: ${HERMES_TRIAGE_MAX_TOOL_CALLS:-3}
      HERMES_TRIAGE_TIMEOUT_MS: ${HERMES_TRIAGE_TIMEOUT_MS:-180000}
      HERMES_TOOL_TIMEOUT_MS: ${HERMES_TOOL_TIMEOUT_MS:-10000}
      HERMES_TOOL_RESULT_MAX_BYTES: ${HERMES_TOOL_RESULT_MAX_BYTES:-65536}
      HERMES_STRICT_CAPABILITIES: ${HERMES_STRICT_CAPABILITIES:-true}
      HERMES_ENFORCE_SAFE_TOOLSETS: ${HERMES_ENFORCE_SAFE_TOOLSETS:-true}
      HERMES_REQUIRE_TOOLLESS_PROFILE: ${HERMES_REQUIRE_TOOLLESS_PROFILE:-true}
      HERMES_FORBIDDEN_TOOLS: ${HERMES_FORBIDDEN_TOOLS:-terminal,execute_code,write_file,patch,delete_file,move_file,browser,web_search,web_extract,delegate_task,cronjob,shell,ssh}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "elastictrainee:host-gateway"
    ports:
      - "127.0.0.1:3000:3000"
  frontend:
    build: ./frontend
    container_name: soc_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:

